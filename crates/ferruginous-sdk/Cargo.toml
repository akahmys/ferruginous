[package]
name = "ferruginous-sdk"
version = "0.1.0"
authors = { workspace = true }
edition = { workspace = true }
rust-version = { workspace = true }
license = { workspace = true }

[lints]
workspace = true

[dependencies]
thiserror = { workspace = true }
nom = "7.1"
byteorder = "1.5"
miniz_oxide = "0.7"
aes = "0.8"
cbc = "0.1"
md-5 = "0.10"
sha2 = "0.10"
cms = "0.2"
x509-cert = "0.2"
der = { version = "0.7", features = ["derive"] }
serde = { version = "1.0", features = ["derive", "rc"] }
kurbo = { version = "0.13", features = ["serde"] }
jpeg-decoder = "0.3.2"
ttf-parser = { workspace = true }
lcms2 = { workspace = true }
fax = "0.2"
weezl = "0.1"
justbig2 = "0.1"
x509-parser = "0.16"
rsa = "0.9"
ed25519-dalek = "2.1"

[dev-dependencies]
proptest = "1.4"
criterion = "0.5"

[[bench]]
name = "parse_bench"
harness = false

name: RR-15 compliance audit

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install Rust (Edition 2024 / MSRV 1.94)
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: 1.94
        components: clippy

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2

    - name: Install System Dependencies (Linux GUI Build Requirements)
      run: |
        sudo apt-get update
        sudo apt-get install -y pkg-config libxkbcommon-dev libx11-dev libxcb1-dev libxcursor-dev libxi-dev libxrandr-dev libudev-dev libasound2-dev libegl1-mesa-dev libwayland-dev

    - name: Run Secret Scanning Script
      run: |
        chmod +x ./scripts/audit/verify_secrets.sh
        ./scripts/audit/verify_secrets.sh

    - name: Run Gitleaks (Industry Standard)
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Run RR-15 Compliance Audit
      run: |
        chmod +x ./scripts/audit/verify_compliance.sh
        ./scripts/audit/verify_compliance.sh

    - name: Build and Test GUI Application
      run: |
        cargo build --verbose -p ferruginous
        cargo test --verbose --workspace


name: Visual Regression Verification

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  visual-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install Rust (Edition 2024 / MSRV 1.94)
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: 1.94

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2

    - name: Install System Dependencies (Linux GUI / Headless Render Requirements)
      run: |
        sudo apt-get update
        sudo apt-get install -y pkg-config libxkbcommon-dev libx11-dev libxcb1-dev libxcursor-dev libxi-dev libxrandr-dev libudev-dev libasound2-dev libegl1-mesa-dev libwayland-dev mesa-vulkan-drivers

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Run Visual Regression Verification Suite
      run: |
        make visual-test
